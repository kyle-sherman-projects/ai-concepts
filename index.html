<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive visual organizers for AI concepts from Russell & Norvig chapters 1-3">
    <meta name="author" content="Kyle Sherman">
    <title>AI Concepts: Visual Organizers</title>
    
    <!-- React & Babel for JSX -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }
        
        #root {
            min-height: 100vh;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0a0e27;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #0891b2;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #06b6d4;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;

        // ===== ICON COMPONENTS =====
        const ChevronDown = ({ size = 24, style = {}, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={style} {...props}>

        const Brain = ({ size = 24, style = {}, ...props }) => (

        const Network = ({ size = 24, style = {}, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={style} {...props}>

                <rect x="2" y="16" width="6" height="6" rx="1"></rect>

        const Layers = ({ size = 24, style = {}, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={style} {...props}>

        const Target = ({ size = 24, style = {}, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={style} {...props}>
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="12" r="6"></circle>
                <circle cx="12" cy="12" r="2"></circle>
            </svg>
        );

        const AlertCircle = ({ size = 24, style = {}, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={style} {...props}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const Zap = ({ size = 24, style = {}, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={style} {...props}>
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
        );

        // ===== HIERARCHY VIEW COMPONENT =====
        function HierarchyView({ expandedNodes, setExpandedNodes, selectedConcept, setSelectedConcept, hoveredNode, setHoveredNode }) {
            const toggleNode = (nodeId) => {
                const newExpanded = new Set(expandedNodes);
                if (newExpanded.has(nodeId)) {
                    newExpanded.delete(nodeId);
                } else {
                    newExpanded.add(nodeId);
                }
                setExpandedNodes(newExpanded);
            };

            const hierarchyData = {
                id: 'root',
                label: 'Artificial Intelligence',
                color: '#00ffff',
                children: [
                    {
                        id: 'agents',
                        label: 'Intelligent Agents',
                        color: '#00ff88',
                        description: 'Entities that perceive and act in environments',
                        children: [
                            {
                                id: 'agent-types',
                                label: 'Agent Architectures',
                                color: '#4ade80',
                                children: [
                                    { id: 'reflex', label: 'Simple Reflex Agents', description: 'Condition-action rules based on current percept' },
                                    { id: 'model-based', label: 'Model-Based Agents', description: 'Maintain internal state and world model' },
                                    { id: 'goal-based', label: 'Goal-Based Agents', description: 'Use goal information to guide decisions' },
                                    { id: 'utility-based', label: 'Utility-Based Agents', description: 'Maximize utility function for decision-making' },
                                    { id: 'learning', label: 'Learning Agents', description: 'Improve performance through experience' }
                                ]
                            },
                            {
                                id: 'rationality',
                                label: 'Rationality Concepts',
                                color: '#22d3ee',
                                children: [
                                    { id: 'bounded', label: 'Bounded Rationality', description: 'Limited computational resources affect decisions' },
                                    { id: 'satisficing', label: 'Satisficing', description: 'Good enough solutions vs optimal (Herbert Simon)' },
                                    { id: 'performance', label: 'Performance Measures', description: 'Evaluating agent success by consequences' }
                                ]
                            },
                            {
                                id: 'environments',
                                label: 'Task Environments',
                                color: '#a78bfa',
                                children: [
                                    { id: 'observable', label: 'Observability: Full vs Partial', description: 'Can agent see complete state?' },
                                    { id: 'deterministic', label: 'Deterministic vs Stochastic', description: 'Are outcomes predictable?' },
                                    { id: 'episodic', label: 'Episodic vs Sequential', description: 'Do actions affect future episodes?' },
                                    { id: 'static', label: 'Static vs Dynamic', description: 'Does world change during deliberation?' }
                                ]
                            }
                        ]
                    },
                    {
                        id: 'search',
                        label: 'Problem Solving & Search',
                        color: '#f59e0b',
                        description: 'Finding solution paths in state spaces',
                        children: [
                            {
                                id: 'uninformed',
                                label: 'Uninformed Search',
                                color: '#fb923c',
                                children: [
                                    { id: 'bfs', label: 'Breadth-First Search', description: 'Expand shallowest nodes; complete & optimal for unit costs' },
                                    { id: 'ucs', label: 'Uniform-Cost Search', description: 'Expand lowest path cost (Dijkstra)' },
                                    { id: 'dfs', label: 'Depth-First Search', description: 'Expand deepest; memory efficient but incomplete' },
                                    { id: 'ids', label: 'Iterative Deepening', description: 'Combines BFS completeness with DFS memory efficiency' }
                                ]
                            },
                            {
                                id: 'informed',
                                label: 'Informed Search',
                                color: '#fbbf24',
                                children: [
                                    { id: 'greedy', label: 'Greedy Best-First', description: 'Expand node closest to goal (by heuristic)' },
                                    { id: 'astar', label: 'A* Search', description: 'f(n)=g(n)+h(n); optimal with admissible heuristic' },
                                    { id: 'weighted', label: 'Weighted A*', description: 'Trade optimality for speed with W>1' },
                                    { id: 'ida', label: 'IDA* & RBFS', description: 'Memory-bounded variants of A*' }
                                ]
                            },
                            {
                                id: 'heuristics',
                                label: 'Heuristic Functions',
                                color: '#34d399',
                                children: [
                                    { id: 'admissible', label: 'Admissibility', description: 'Never overestimate cost to goal' },
                                    { id: 'consistent', label: 'Consistency', description: 'Triangle inequality: h(n)≤c(n,a,n\')+h(n\')' },
                                    { id: 'dominance', label: 'Dominance', description: 'h2 dominates h1 if h2(n)≥h1(n) for all n' },
                                    { id: 'relaxed', label: 'Relaxed Problems', description: 'Fewer constraints; optimal cost is admissible' }
                                ]
                            }
                        ]
                    },
                    {
                        id: 'representations',
                        label: 'Knowledge Representation',
                        color: '#ec4899',
                        children: [
                            { id: 'atomic', label: 'Atomic', description: 'Indivisible states with no structure' },
                            { id: 'factored', label: 'Factored', description: 'States as variable-value pairs' },
                            { id: 'structured', label: 'Structured', description: 'Objects and relationships (first-order logic)' },
                            { id: 'distributed', label: 'Distributed', description: 'Concepts across multiple memory locations (neural)' }
                        ]
                    },
                    {
                        id: 'foundations',
                        label: 'Theoretical Foundations',
                        color: '#8b5cf6',
                        children: [
                            {
                                id: 'complexity',
                                label: 'Computational Complexity',
                                color: '#a78bfa',
                                children: [
                                    { id: 'p', label: 'P (Polynomial)', description: 'Solvable in O(n^k) time' },
                                    { id: 'np', label: 'NP (Nondeterministic Poly)', description: 'Verifiable in polynomial time' },
                                    { id: 'np-complete', label: 'NP-Complete', description: 'Hardest problems in NP' },
                                    { id: 'np-hard', label: 'NP-Hard', description: 'At least as hard as NP-complete' }
                                ]
                            }
                        ]
                    }
                ]
            };

            const TreeNode = ({ node, level = 0 }) => {
                const isExpanded = expandedNodes.has(node.id);
                const hasChildren = node.children && node.children.length > 0;
                const isHovered = hoveredNode === node.id;

                return (
                    <div style={{ marginLeft: level > 0 ? '2rem' : 0 }}>
                        <div
                            style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: '0.75rem',
                                padding: '0.75rem 1rem',
                                margin: '0.25rem 0',
                                background: isHovered ? 'rgba(0, 255, 255, 0.1)' : 'rgba(15, 23, 42, 0.4)',
                                border: `1px solid ${isHovered ? node.color || '#00ffff' : 'rgba(148, 163, 184, 0.2)'}`,
                                borderLeft: `4px solid ${node.color || '#00ffff'}`,
                                borderRadius: '6px',
                                cursor: hasChildren ? 'pointer' : 'default',
                                transition: 'all 0.2s ease',
                                boxShadow: isHovered ? `0 0 15px ${node.color || '#00ffff'}33` : 'none'
                            }}
                            onClick={() => hasChildren && toggleNode(node.id)}
                            onMouseEnter={() => setHoveredNode(node.id)}
                            onMouseLeave={() => setHoveredNode(null)}
                        >
                            {hasChildren && (
                                <span style={{ color: node.color || '#00ffff', flexShrink: 0 }}>
                                    {isExpanded ? <ChevronDown size={18} /> : <ChevronRight size={18} />}
                                </span>
                            )}
                            {!hasChildren && <span style={{ width: '18px', flexShrink: 0 }} />}
                            
                            <div style={{ flex: 1 }}>
                                <div style={{
                                    fontSize: level === 0 ? '1.1rem' : '0.95rem',
                                    fontWeight: level < 2 ? 600 : 500,
                                    color: node.color || '#e0e7ff'
                                }}>
                                    {node.label}
                                </div>
                                {node.description && (
                                    <div style={{
                                        fontSize: '0.85rem',
                                        color: '#94a3b8',
                                        marginTop: '0.25rem'
                                    }}>
                                        {node.description}
                                    </div>
                                )}
                            </div>

                            {!hasChildren && (
                                <button
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        setSelectedConcept(node);
                                    }}
                                    style={{
                                        padding: '0.35rem 0.75rem',
                                        background: 'rgba(0, 255, 255, 0.1)',
                                        border: '1px solid rgba(0, 255, 255, 0.3)',
                                        borderRadius: '4px',
                                        color: '#00ffff',
                                        fontSize: '0.8rem',
                                        cursor: 'pointer',
                                        fontFamily: 'inherit',
                                        transition: 'all 0.2s ease'
                                    }}
                                    onMouseEnter={(e) => {
                                        e.currentTarget.style.background = 'rgba(0, 255, 255, 0.2)';
                                    }}
                                    onMouseLeave={(e) => {
                                        e.currentTarget.style.background = 'rgba(0, 255, 255, 0.1)';
                                    }}
                                >
                                    Details
                                </button>
                            )}
                        </div>

                        {hasChildren && isExpanded && (
                            <div style={{ marginTop: '0.25rem' }}>
                                {node.children.map(child => (
                                    <TreeNode key={child.id} node={child} level={level + 1} />
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div>
                    <div style={{
                        marginBottom: '2rem',
                        padding: '1.5rem',
                        background: 'rgba(0, 255, 255, 0.05)',
                        border: '1px solid rgba(0, 255, 255, 0.2)',
                        borderRadius: '8px'
                    }}>
                        <h2 style={{
                            margin: '0 0 0.5rem 0',
                            fontSize: '1.3rem',
                            color: '#00ffff'
                        }}>
                            Concept Hierarchy Explorer
                        </h2>
                        <p style={{
                            margin: 0,
                            fontSize: '0.9rem',
                            color: '#94a3b8'
                        }}>
                            Click to expand/collapse branches. Hover for highlighting. Click "Details" for in-depth information.
                        </p>
                    </div>
                    
                    <TreeNode node={hierarchyData} />
                </div>
            );
        }

        // ===== RELATIONSHIPS VIEW COMPONENT =====
        function RelationshipsView({ setSelectedConcept }) {
            const [hoveredRelation, setHoveredRelation] = useState(null);

            const relationships = [
                {
                    id: 'r1',
                    from: 'Bounded Rationality',
                    to: 'Satisficing',
                    type: 'leads to',
                    description: 'Limited resources require "good enough" decisions',
                    color: '#00ffff'
                },
                {
                    id: 'r2',
                    from: 'Admissible Heuristic',
                    to: 'A* Optimality',
                    type: 'guarantees',
                    description: 'Never overestimating ensures finding optimal solution',
                    color: '#f59e0b'
                },
                {
                    id: 'r3',
                    from: 'Model-Based Agent',
                    to: 'Partial Observability',
                    type: 'handles',
                    description: 'Internal state tracks unseen world aspects',
                    color: '#00ff88'
                },
                {
                    id: 'r4',
                    from: 'Learning Agent',
                    to: 'Autonomy',
                    type: 'achieves',
                    description: 'Experience reduces reliance on designer knowledge',
                    color: '#ec4899'
                },
                {
                    id: 'r5',
                    from: 'Utility Function',
                    to: 'Performance Measure',
                    type: 'internalizes',
                    description: 'Agent\'s internal values align with external goals',
                    color: '#8b5cf6'
                },
                {
                    id: 'r6',
                    from: 'Breadth-First Search',
                    to: 'Iterative Deepening',
                    type: 'inspires',
                    description: 'IDS achieves BFS completeness with DFS memory',
                    color: '#fb923c'
                },
                {
                    id: 'r7',
                    from: 'Consistent Heuristic',
                    to: 'Admissible Heuristic',
                    type: 'implies',
                    description: 'Consistency is stronger property than admissibility',
                    color: '#34d399'
                },
                {
                    id: 'r8',
                    from: 'Sequential Environment',
                    to: 'Goal-Based Agent',
                    type: 'requires',
                    description: 'Future consequences need goal-directed planning',
                    color: '#a78bfa'
                },
                {
                    id: 'r9',
                    from: 'Relaxed Problem',
                    to: 'Admissible Heuristic',
                    type: 'generates',
                    description: 'Optimal relaxed solution never overestimates',
                    color: '#fbbf24'
                },
                {
                    id: 'r10',
                    from: 'NP-Complete',
                    to: 'Heuristic Search',
                    type: 'motivates',
                    description: 'Intractable problems need intelligent guidance',
                    color: '#c084fc'
                }
            ];

            return (
                <div>
                    <div style={{
                        marginBottom: '2rem',
                        padding: '1.5rem',
                        background: 'rgba(0, 255, 255, 0.05)',
                        border: '1px solid rgba(0, 255, 255, 0.2)',
                        borderRadius: '8px'
                    }}>
                        <h2 style={{
                            margin: '0 0 0.5rem 0',
                            fontSize: '1.3rem',
                            color: '#00ffff'
                        }}>
                            Concept Relationships Map
                        </h2>
                        <p style={{
                            margin: 0,
                            fontSize: '0.9rem',
                            color: '#94a3b8'
                        }}>
                            Key relationships showing how concepts connect, influence, and depend on each other
                        </p>
                    </div>

                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: 'repeat(auto-fill, minmax(400px, 1fr))',
                        gap: '1.5rem'
                    }}>
                        {relationships.map((rel) => {
                            const isHovered = hoveredRelation === rel.id;
                            return (
                                <div
                                    key={rel.id}
                                    style={{
                                        padding: '1.5rem',
                                        background: isHovered ? 'rgba(0, 255, 255, 0.08)' : 'rgba(15, 23, 42, 0.6)',
                                        border: `1px solid ${isHovered ? rel.color : 'rgba(148, 163, 184, 0.2)'}`,
                                        borderRadius: '8px',
                                        transition: 'all 0.3s ease',
                                        cursor: 'pointer',
                                        boxShadow: isHovered ? `0 0 20px ${rel.color}33` : 'none'
                                    }}
                                    onMouseEnter={() => setHoveredRelation(rel.id)}
                                    onMouseLeave={() => setHoveredRelation(null)}
                                >
                                    <div style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '1rem',
                                        marginBottom: '1rem'
                                    }}>
                                        <div style={{
                                            flex: 1,
                                            padding: '0.75rem',
                                            background: 'rgba(0, 0, 0, 0.3)',
                                            borderLeft: `3px solid ${rel.color}`,
                                            borderRadius: '4px',
                                            fontSize: '0.95rem',
                                            fontWeight: 600,
                                            color: '#e0e7ff'
                                        }}>
                                            {rel.from}
                                        </div>
                                        
                                        <div style={{
                                            display: 'flex',
                                            flexDirection: 'column',
                                            alignItems: 'center',
                                            gap: '0.25rem'
                                        }}>
                                            <Zap size={20} style={{ color: rel.color }} />
                                            <div style={{
                                                fontSize: '0.7rem',
                                                color: rel.color,
                                                textTransform: 'uppercase',
                                                letterSpacing: '0.05em',
                                                fontWeight: 600
                                            }}>
                                                {rel.type}
                                            </div>
                                        </div>

                                        <div style={{
                                            flex: 1,
                                            padding: '0.75rem',
                                            background: 'rgba(0, 0, 0, 0.3)',
                                            borderLeft: `3px solid ${rel.color}`,
                                            borderRadius: '4px',
                                            fontSize: '0.95rem',
                                            fontWeight: 600,
                                            color: '#e0e7ff'
                                        }}>
                                            {rel.to}
                                        </div>
                                    </div>

                                    <div style={{
                                        padding: '0.75rem',
                                        background: 'rgba(0, 0, 0, 0.2)',
                                        borderRadius: '4px',
                                        fontSize: '0.85rem',
                                        color: '#94a3b8',
                                        fontStyle: 'italic'
                                    }}>
                                        {rel.description}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ===== TIMELINE VIEW COMPONENT =====

                    color: '#00ffff',

                    ]
                },
                {

                    ]

            const difficultyColors = {

            };

            return (
                <div>

                                background: 'linear-gradient(135deg, #00ffff 0%, #00ff88 100%)',
                                WebkitBackgroundClip: 'text',
                                WebkitTextFillColor: 'transparent',
                                letterSpacing: '-0.02em'
                            }}>
                                AI Concepts: Visual Map
                            </h1>
                        </div>
                        <p style={{
                            margin: '0.5rem 0 0 3.5rem',
                            fontSize: '0.95rem',
                            color: '#94a3b8',
                            letterSpacing: '0.02em'
                        }}>
                            Interactive exploration of foundational AI concepts from Russell & Norvig Ch. 1-3
                        </p>
                    </div>

                    {/* View Tabs */}
                    <div style={{
                        position: 'relative',
                        padding: '1.5rem 3rem',
                        display: 'flex',
                        gap: '1rem',
                        borderBottom: '1px solid rgba(0, 255, 255, 0.1)',
                        background: 'rgba(15, 20, 35, 0.6)',
                        flexWrap: 'wrap'
                    }}>
                        {views.map((view) => {
                            const Icon = view.icon;
                            const isActive = activeView === view.id;
                            return (
                                <button
                                    key={view.id}
                                    onClick={() => setActiveView(view.id)}
                                    style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '0.75rem',
                                        padding: '0.75rem 1.5rem',
                                        background: isActive 
                                            ? 'linear-gradient(135deg, rgba(0, 255, 255, 0.15) 0%, rgba(0, 255, 136, 0.15) 100%)'
                                            : 'transparent',
                                        border: isActive 
                                            ? '1px solid rgba(0, 255, 255, 0.4)'
                                            : '1px solid rgba(148, 163, 184, 0.2)',
                                        borderRadius: '8px',
                                        color: isActive ? '#00ffff' : '#94a3b8',
                                        fontSize: '0.9rem',
                                        fontWeight: 600,
                                        cursor: 'pointer',
                                        transition: 'all 0.3s ease',
                                        fontFamily: 'inherit',
                                        boxShadow: isActive ? '0 0 20px rgba(0, 255, 255, 0.2)' : 'none'
                                    }}
                                    onMouseEnter={(e) => {
                                        if (!isActive) {
                                            e.currentTarget.style.borderColor = 'rgba(0, 255, 255, 0.3)';
                                            e.currentTarget.style.color = '#00ffff';
                                        }
                                    }}
                                    onMouseLeave={(e) => {
                                        if (!isActive) {
                                            e.currentTarget.style.borderColor = 'rgba(148, 163, 184, 0.2)';
                                            e.currentTarget.style.color = '#94a3b8';
                                        }
                                    }}
                                >
                                    <Icon size={18} />
                                    {view.name}
                                </button>
                            );
                        })}
                    </div>

                    {/* Content Area */}
                    <div style={{ padding: '2rem 3rem', position: 'relative' }}>
                        {activeView === 'hierarchy' && (
                            <HierarchyView 
                                expandedNodes={expandedNodes}
                                setExpandedNodes={setExpandedNodes}
                                selectedConcept={selectedConcept}
                                setSelectedConcept={setSelectedConcept}
                                hoveredNode={hoveredNode}
                                setHoveredNode={setHoveredNode}
                            />
                        )}
                        {activeView === 'relationships' && (
                            <RelationshipsView 
                                setSelectedConcept={setSelectedConcept}
                            />
                        )}
                        {activeView === 'timeline' && (
                            <TimelineView />
                        )}
                        {activeView === 'comparison' && (
                            <ComparisonView />
                        )}
                    </div>

                    {/* Concept Detail Sidebar */}
                    {selectedConcept && (
                        <ConceptDetail 
                            concept={selectedConcept}
                            onClose={() => setSelectedConcept(null)}
                        />
                    )}
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<AIConceptsOrganizer />, document.getElementById('root'));
    </script>
</body>
</html>
